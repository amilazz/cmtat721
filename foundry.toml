[profile.default]
src = "contracts"
test = "test/foundry"
out = "out"
cache_path = "cache_forge"
libs = ["lib", "node_modules"]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
  "hardhat/=node_modules/hardhat/"
]
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 512
